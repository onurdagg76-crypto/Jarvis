<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>J.A.R.V.I.S</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  :root { --arc: #00d4ff; --arc-dim: #0088aa; --gold: #ffa500; --bg: #020c14; --border: #0a3d55; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--arc); font-family: 'Share Tech Mono', monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .logo { display: flex; align-items: center; gap: 12px; }
  .arc-dot { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--arc); background: radial-gradient(circle, #00d4ff 0%, #004466 60%, transparent 100%); box-shadow: 0 0 15px var(--arc); animation: pulse 2s ease-in-out infinite; flex-shrink: 0; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 8px var(--arc);}50%{box-shadow:0 0 25px var(--arc);} }
  .logo h1 { font-family: 'Orbitron', sans-serif; font-size: 20px; letter-spacing: 6px; text-shadow: 0 0 15px var(--arc); }
  .status { display: flex; gap: 16px; align-items: center; font-size: 10px; letter-spacing: 2px; color: var(--arc-dim); }
  .online { width: 8px; height: 8px; border-radius: 50%; background: #00ff88; box-shadow: 0 0 8px #00ff88; animation: blink 1.5s infinite; }
  @keyframes blink { 0%,100%{opacity:1;}50%{opacity:0.3;} }

  /* TABS */
  .tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .tab { padding: 10px 20px; font-size: 11px; letter-spacing: 2px; cursor: pointer; color: var(--arc-dim); border-bottom: 2px solid transparent; transition: all 0.2s; background: none; border-top: none; border-left: none; border-right: none; font-family: 'Share Tech Mono', monospace; }
  .tab.active { color: var(--arc); border-bottom-color: var(--arc); }
  .tab:hover { color: var(--arc); }

  /* API KEY */
  .api-section { background: rgba(0,20,35,0.95); border-bottom: 2px solid var(--arc); padding: 10px 20px; flex-shrink: 0; display: flex; gap: 10px; align-items: center; }
  .api-section label { font-size: 9px; letter-spacing: 2px; color: var(--arc); white-space: nowrap; }
  .api-section input { flex: 1; background: rgba(0,30,50,0.9); border: 1px solid var(--arc); color: var(--arc); font-family: 'Share Tech Mono', monospace; font-size: 12px; padding: 8px 12px; border-radius: 4px; outline: none; }
  .api-section input::placeholder { color: var(--arc-dim); opacity: 0.6; }

  /* PANELS */
  .panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  .panel.active { display: flex; }

  /* CHAT */
  .chat-area { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; scrollbar-width: thin; scrollbar-color: var(--arc-dim) transparent; }
  .msg { display: flex; gap: 10px; animation: msgIn 0.3s ease-out; }
  @keyframes msgIn { from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);} }
  .msg.user { flex-direction: row-reverse; }
  .avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0; margin-top: 2px; font-weight: bold; }
  .msg.jarvis .avatar { border: 1px solid var(--arc); color: var(--arc); background: rgba(0,212,255,0.1); }
  .msg.user .avatar { border: 1px solid var(--gold); color: var(--gold); background: rgba(255,165,0,0.1); }
  .bubble { max-width: 78%; padding: 10px 14px; border-radius: 4px; font-size: 13px; line-height: 1.6; }
  .msg.jarvis .bubble { background: rgba(0,25,45,0.9); border: 1px solid var(--border); color: #b0e8ff; }
  .msg.jarvis .bubble::before { content: 'JARVIS //'; display: block; font-size: 8px; letter-spacing: 2px; color: var(--arc); margin-bottom: 5px; }
  .msg.user .bubble { background: rgba(255,165,0,0.08); border: 1px solid rgba(255,165,0,0.3); color: #ffd080; }
  .msg.user .bubble::before { content: 'SİZ //'; display: block; font-size: 8px; letter-spacing: 2px; color: var(--gold); margin-bottom: 5px; text-align: right; }
  .typing { display: flex; gap: 5px; padding: 4px 0; }
  .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--arc); animation: dot 1.2s ease-in-out infinite; }
  .typing span:nth-child(2){animation-delay:0.2s;} .typing span:nth-child(3){animation-delay:0.4s;}
  @keyframes dot{0%,100%{opacity:0.2;transform:scale(0.8);}50%{opacity:1;transform:scale(1.2);}}

  /* QUICK BAR */
  .quick-bar { display: flex; gap: 8px; padding: 10px 20px; border-top: 1px solid var(--border); overflow-x: auto; flex-shrink: 0; scrollbar-width: none; }
  .quick-bar::-webkit-scrollbar{display:none;}
  .qbtn { background: rgba(0,25,45,0.9); border: 1px solid var(--border); color: var(--arc); font-family: 'Share Tech Mono', monospace; font-size: 10px; padding: 6px 12px; border-radius: 3px; cursor: pointer; white-space: nowrap; transition: all 0.2s; flex-shrink: 0; }
  .qbtn:hover{border-color:var(--arc);background:rgba(0,212,255,0.1);}

  /* INPUT */
  .input-area { border-top: 2px solid var(--arc); padding: 12px 20px; display: flex; gap: 10px; align-items: flex-end; background: rgba(2,12,20,0.99); flex-shrink: 0; position: sticky; bottom: 0; z-index: 100; }
  .input-area textarea { flex: 1; background: rgba(0,20,35,0.9); border: 1px solid var(--border); color: var(--arc); font-family: 'Share Tech Mono', monospace; font-size: 13px; padding: 10px 14px; border-radius: 4px; outline: none; resize: none; min-height: 44px; max-height: 100px; line-height: 1.5; transition: border-color 0.2s; }
  .input-area textarea:focus{border-color:var(--arc);}
  .input-area textarea::placeholder{color:var(--arc-dim);opacity:0.5;}
  .send-btn { background: rgba(0,212,255,0.12); border: 1px solid var(--arc); color: var(--arc); font-family: 'Orbitron', sans-serif; font-size: 10px; letter-spacing: 2px; padding: 0 18px; height: 44px; border-radius: 4px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .send-btn:hover{background:rgba(0,212,255,0.25);box-shadow:0 0 15px rgba(0,212,255,0.3);}
  .send-btn:disabled{opacity:0.4;cursor:not-allowed;}

  /* GMAIL PANEL */
  .gmail-panel { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .gmail-connect { text-align: center; padding: 40px 20px; }
  .gmail-connect h2 { font-family: 'Orbitron', sans-serif; font-size: 16px; letter-spacing: 4px; color: var(--arc); margin-bottom: 10px; }
  .gmail-connect p { font-size: 12px; color: var(--arc-dim); line-height: 1.8; margin-bottom: 20px; }
  .connect-btn { background: rgba(0,212,255,0.1); border: 1px solid var(--arc); color: var(--arc); font-family: 'Orbitron', sans-serif; font-size: 11px; letter-spacing: 2px; padding: 12px 24px; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
  .connect-btn:hover{background:rgba(0,212,255,0.2);box-shadow:0 0 15px rgba(0,212,255,0.3);}
  .connect-btn.gmail{border-color:var(--gold);color:var(--gold);background:rgba(255,165,0,0.1);}
  .connect-btn.gmail:hover{background:rgba(255,165,0,0.2);}

  .mail-item { background: rgba(0,20,35,0.9); border: 1px solid var(--border); border-radius: 4px; padding: 12px 16px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s; }
  .mail-item:hover{border-color:var(--arc);background:rgba(0,212,255,0.05);}
  .mail-item.unread{border-left: 3px solid var(--arc);}
  .mail-from { font-size: 11px; color: var(--arc); margin-bottom: 4px; }
  .mail-subject { font-size: 13px; color: #b0e8ff; margin-bottom: 4px; }
  .mail-date { font-size: 9px; color: var(--arc-dim); letter-spacing: 1px; }
  .mail-summary { font-size: 11px; color: var(--arc-dim); margin-top: 8px; line-height: 1.6; border-top: 1px solid var(--border); padding-top: 8px; display: none; }
  .mail-item.expanded .mail-summary { display: block; }

  .gmail-actions { display: flex; gap: 10px; padding: 10px 20px; border-top: 1px solid var(--border); flex-shrink: 0; }
  .action-btn { flex: 1; background: rgba(0,20,35,0.9); border: 1px solid var(--border); color: var(--arc); font-family: 'Share Tech Mono', monospace; font-size: 10px; padding: 8px; border-radius: 3px; cursor: pointer; transition: all 0.2s; text-align: center; }
  .action-btn:hover{border-color:var(--arc);background:rgba(0,212,255,0.1);}

  .client-config { background: rgba(0,20,35,0.9); border: 1px solid var(--border); border-radius: 4px; padding: 16px; margin: 10px 0; }
  .client-config input { width: 100%; background: rgba(0,30,50,0.9); border: 1px solid var(--border); color: var(--arc); font-family: 'Share Tech Mono', monospace; font-size: 11px; padding: 8px 12px; border-radius: 3px; outline: none; margin-bottom: 8px; }
  .client-config input:focus{border-color:var(--arc);}
  .client-config label { font-size: 9px; letter-spacing: 2px; color: var(--arc-dim); display: block; margin-bottom: 4px; }

  ::-webkit-scrollbar{width:3px;}
  ::-webkit-scrollbar-thumb{background:var(--arc-dim);}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="arc-dot"></div>
    <h1>J.A.R.V.I.S</h1>
  </div>
  <div class="status">
    <span id="timer">00:00</span>
    <span>OPENROUTER</span>
    <div class="online"></div>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('chat')">// SOHBET</button>
  <button class="tab" onclick="switchTab('gmail')">// MAİL</button>
</div>

<div class="api-section">
  <label>OR KEY //</label>
  <input type="password" id="api-key" placeholder="sk-or-v1-... OpenRouter anahtarı" />
</div>

<!-- CHAT PANEL -->
<div class="panel active" id="panel-chat">
  <div class="chat-area" id="chat">
    <div style="text-align:center;padding:40px 20px;color:var(--arc-dim);">
      <div style="font-family:Orbitron,sans-serif;font-size:18px;letter-spacing:4px;color:var(--arc);text-shadow:0 0 15px var(--arc);margin-bottom:10px;">SİSTEM HAZIR</div>
      <p style="font-size:12px;line-height:1.8;">OpenRouter API anahtarınızı girin ve konuşmaya başlayın.</p>
      <div style="display:inline-block;margin-top:14px;font-size:10px;letter-spacing:3px;color:#00ff88;padding:6px 16px;border:1px solid #00ff8844;border-radius:3px;">// OPENROUTER AKTİF //</div>
    </div>
  </div>
  <div class="quick-bar">
    <button class="qbtn" onclick="quick('Bana bugün için motive edici bir günlük brifing ver.')">🌅 Günlük Brifing</button>
    <button class="qbtn" onclick="quick('Üretken bir gün için 5 maddelik görev listesi öner.')">📋 Görev Planı</button>
    <button class="qbtn" onclick="quick('İlginç bir bilimsel gerçek öğret.')">🔬 Bilgi Dozu</button>
    <button class="qbtn" onclick="quick('Güçlü ve motive edici bir alıntı söyle.')">⚡ Motivasyon</button>
    <button class="qbtn" onclick="quick('Beni 2 dakikalık nefes meditasyonuna yönlendir.')">🧘 Odaklan</button>
  </div>
  <div class="input-area">
    <textarea id="input" placeholder="JARVIS'e sorun... (Enter ile gönderin)" rows="1"></textarea>
    <button class="send-btn" id="send-btn" onclick="send()">GÖNDER ▶</button>
  </div>
</div>

<!-- GMAIL PANEL -->
<div class="panel" id="panel-gmail">
  <div class="gmail-panel" id="gmail-content">
    <div class="gmail-connect" id="gmail-setup">
      <h2>📧 MAİL MODÜLÜ</h2>
      <p>Gmail hesabınızı bağlayarak JARVIS'in<br>maillerinizi okumasını ve özetlemesini sağlayın.</p>
      
      <div class="client-config">
        <label>GOOGLE CLIENT ID //</label>
        <input type="text" id="client-id" placeholder="79007149863-....apps.googleusercontent.com" />
        <label>GOOGLE CLIENT SECRET //</label>
        <input type="password" id="client-secret" placeholder="GOCSPX-..." />
      </div>
      
      <button class="connect-btn gmail" onclick="connectGmail()">📧 GMAIL'E BAĞLAN</button>
    </div>
    <div id="mail-list" style="display:none;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <div style="font-size:9px;letter-spacing:3px;color:var(--arc);">// GELEN KUTUSU</div>
        <button class="action-btn" style="flex:0;padding:6px 12px;" onclick="loadMails()">🔄 Yenile</button>
      </div>
      <div id="mails"></div>
    </div>
  </div>
  <div class="gmail-actions" id="gmail-actions" style="display:none;">
    <button class="action-btn" onclick="summarizeAll()">📋 Tümünü Özetle</button>
    <button class="action-btn" onclick="findImportant()">⭐ Önemli Olanlar</button>
    <button class="action-btn" onclick="disconnectGmail()">🔌 Bağlantıyı Kes</button>
  </div>
</div>

<script>
const SYSTEM = `Sen JARVIS'sin - Iron Man'deki gibi kişisel AI asistan. Türkçe konuş, profesyonel ama sıcak ol. Cevapları kısa tut (3-4 cümle max) çünkü sesle okunacak. Zaman zaman ince espri yap.`;

let msgs = [];
let loading = false;
let start = Date.now();
let accessToken = null;
let emails = [];

// Timer
setInterval(() => {
  const e = Math.floor((Date.now()-start)/1000);
  document.getElementById('timer').textContent = String(Math.floor(e/60)).padStart(2,'0')+':'+String(e%60).padStart(2,'0');
}, 1000);

// Tab switching
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
}

// Auto-resize textarea
const ta = document.getElementById('input');
ta.addEventListener('input', () => { ta.style.height='auto'; ta.style.height=Math.min(ta.scrollHeight,100)+'px'; });
ta.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} });

function addMsg(role, text) {
  const chat = document.getElementById('chat');
  const welcome = chat.querySelector('div[style]');
  if(welcome) welcome.remove();
  const d = document.createElement('div'); d.className=`msg ${role}`;
  const av = document.createElement('div'); av.className='avatar'; av.textContent=role==='jarvis'?'AI':'SZ';
  const b = document.createElement('div'); b.className='bubble'; b.textContent=text;
  d.appendChild(av); d.appendChild(b); chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const d = document.createElement('div'); d.className='msg jarvis'; d.id='typing';
  const av = document.createElement('div'); av.className='avatar'; av.textContent='AI';
  const b = document.createElement('div'); b.className='bubble';
  b.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';
  d.appendChild(av); d.appendChild(b); chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() { const t=document.getElementById('typing'); if(t)t.remove(); }

function speak(text) {
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang='tr-TR'; u.rate=0.92; u.pitch=0.9;
  const voices = window.speechSynthesis.getVoices();
  const tr = voices.find(v=>v.lang.startsWith('tr'));
  if(tr) u.voice=tr;
  window.speechSynthesis.speak(u);
}

async function callAI(prompt, systemOverride) {
  const key = document.getElementById('api-key').value.trim();
  if(!key) return null;
  const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`,'HTTP-Referer':'https://onurdagg76-crypto.github.io','X-Title':'JARVIS'},
    body: JSON.stringify({model:'gpt-3.5-turbo',messages:[{role:'system',content:systemOverride||SYSTEM},{role:'user',content:prompt}],max_tokens:500,temperature:0.8})
  });
  const data = await res.json();
  if(data.error) return null;
  return data.choices[0].message.content;
}

async function quick(text) { document.getElementById('input').value=text; await send(); }

async function send() {
  const key = document.getElementById('api-key').value.trim();
  const text = ta.value.trim();
  if(!text||loading) return;
  if(!key){addMsg('jarvis','Efendim, lütfen önce OpenRouter API anahtarınızı girin!');return;}
  loading=true; document.getElementById('send-btn').disabled=true;
  ta.value=''; ta.style.height='auto';
  addMsg('user',text); msgs.push({role:'user',content:text}); showTyping();
  try {
    const res = await fetch('https://openrouter.ai/api/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`,'HTTP-Referer':'https://onurdagg76-crypto.github.io','X-Title':'JARVIS'},
      body:JSON.stringify({model:'gpt-3.5-turbo',messages:[{role:'system',content:SYSTEM},...msgs],max_tokens:400,temperature:0.8})
    });
    const data = await res.json();
    if(data.error){removeTyping();addMsg('jarvis',`Hata: ${data.error.message}`);}
    else {
      const reply=data.choices[0].message.content;
      removeTyping(); addMsg('jarvis',reply); msgs.push({role:'assistant',content:reply}); speak(reply);
    }
  } catch(err){removeTyping();addMsg('jarvis','Bağlantı hatası.');}
  finally{loading=false;document.getElementById('send-btn').disabled=false;}
}

// GMAIL
function connectGmail() {
  const clientId = document.getElementById('client-id').value.trim();
  if(!clientId){alert('Client ID giriniz!');return;}
  localStorage.setItem('gmail_client_id', clientId);
  localStorage.setItem('gmail_client_secret', document.getElementById('client-secret').value.trim());
  
  const redirectUri = encodeURIComponent(window.location.href.split('?')[0]);
  const scope = encodeURIComponent('https://www.googleapis.com/auth/gmail.readonly');
  const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${clientId}&redirect_uri=${redirectUri}&response_type=token&scope=${scope}&prompt=consent`;
  window.location.href = authUrl;
}

function checkGmailAuth() {
  const hash = window.location.hash;
  if(hash.includes('access_token')) {
    const params = new URLSearchParams(hash.substring(1));
    accessToken = params.get('access_token');
    window.location.hash = '';
    showMailPanel();
    loadMails();
  }
}

function showMailPanel() {
  document.getElementById('gmail-setup').style.display = 'none';
  document.getElementById('mail-list').style.display = 'block';
  document.getElementById('gmail-actions').style.display = 'flex';
}

async function loadMails() {
  if(!accessToken){alert('Gmail bağlantısı yok!');return;}
  document.getElementById('mails').innerHTML = '<div style="text-align:center;padding:20px;color:var(--arc-dim);">Mailler yükleniyor...</div>';
  
  try {
    const res = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages?maxResults=10&q=is:inbox', {
      headers: {'Authorization': `Bearer ${accessToken}`}
    });
    const data = await res.json();
    if(!data.messages){document.getElementById('mails').innerHTML='<div style="text-align:center;padding:20px;color:var(--arc-dim);">Mail bulunamadı.</div>';return;}
    
    emails = [];
    const mailsDiv = document.getElementById('mails');
    mailsDiv.innerHTML = '';
    
    for(const msg of data.messages.slice(0,10)) {
      const msgRes = await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${msg.id}?format=metadata&metadataHeaders=From&metadataHeaders=Subject&metadataHeaders=Date`, {
        headers: {'Authorization': `Bearer ${accessToken}`}
      });
      const msgData = await msgRes.json();
      const headers = msgData.payload.headers;
      const from = headers.find(h=>h.name==='From')?.value || 'Bilinmiyor';
      const subject = headers.find(h=>h.name==='Subject')?.value || '(Konu yok)';
      const date = headers.find(h=>h.name==='Date')?.value || '';
      const unread = msgData.labelIds?.includes('UNREAD');
      
      emails.push({id:msg.id, from, subject, date, snippet:msgData.snippet, unread});
      
      const item = document.createElement('div');
      item.className = `mail-item${unread?' unread':''}`;
      item.innerHTML = `
        <div class="mail-from">📧 ${from.split('<')[0].trim()}</div>
        <div class="mail-subject">${subject}</div>
        <div class="mail-date">${new Date(date).toLocaleDateString('tr-TR')}</div>
        <div class="mail-summary" id="summary-${msg.id}">⏳ Özet yükleniyor...</div>
      `;
      item.onclick = () => toggleMail(item, msg.id, subject, msgData.snippet);
      mailsDiv.appendChild(item);
    }
  } catch(err) {
    document.getElementById('mails').innerHTML = '<div style="text-align:center;padding:20px;color:#ff4444;">Hata: '+err.message+'</div>';
  }
}

async function toggleMail(item, id, subject, snippet) {
  item.classList.toggle('expanded');
  if(item.classList.contains('expanded')) {
    const summaryEl = document.getElementById('summary-'+id);
    const summary = await callAI(
      `Bu mail başlığını ve içeriğini kısaca özetle, Türkçe olarak 2-3 cümle yaz:\nKonu: ${subject}\nİçerik: ${snippet}`,
      'Sen bir mail asistanısın. Mailleri kısa ve net şekilde özetle.'
    );
    summaryEl.textContent = summary || 'Özet alınamadı.';
  }
}

async function summarizeAll() {
  if(emails.length === 0){alert('Önce mailleri yükleyin!');return;}
  const mailList = emails.map(e=>`- ${e.from.split('<')[0]}: ${e.subject}`).join('\n');
  const summary = await callAI(
    `Bu mail listesini analiz et ve önemli konuları Türkçe özetle:\n${mailList}`,
    'Sen bir mail asistanısın. Gelen kutusunu analiz et, önemli konuları ve acil olanları belirt.'
  );
  if(summary) { addMsg('jarvis', summary); speak(summary); switchTabByName('chat'); }
}

async function findImportant() {
  if(emails.length === 0){alert('Önce mailleri yükleyin!');return;}
  const mailList = emails.map(e=>`- ${e.from.split('<')[0]}: ${e.subject} | ${e.snippet?.substring(0,100)}`).join('\n');
  const important = await callAI(
    `Bu mailler arasından önemli ve acil olanları belirle, Türkçe olarak listele:\n${mailList}`,
    'Sen bir mail asistanısın. Önemli ve acil mailleri tespit et.'
  );
  if(important) { addMsg('jarvis', important); speak(important); switchTabByName('chat'); }
}

function switchTabByName(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', (name==='chat'&&i===0)||(name==='gmail'&&i===1));
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
}

function disconnectGmail() {
  accessToken = null;
  document.getElementById('gmail-setup').style.display = 'block';
  document.getElementById('mail-list').style.display = 'none';
  document.getElementById('gmail-actions').style.display = 'none';
}

window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
window.addEventListener('load', checkGmailAuth);
</script>
