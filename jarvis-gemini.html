<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>J.A.R.V.I.S</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --arc: #00d4ff;
    --arc-dim: #0088aa;
    --gold: #ffa500;
    --bg: #020c14;
    --border: #0a3d55;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--arc);
    font-family: 'Share Tech Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .arc-dot {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid var(--arc);
    background: radial-gradient(circle, #00d4ff 0%, #004466 60%, transparent 100%);
    box-shadow: 0 0 15px var(--arc);
    animation: pulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 8px var(--arc); }
    50% { box-shadow: 0 0 25px var(--arc); }
  }

  .logo h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    letter-spacing: 6px;
    text-shadow: 0 0 15px var(--arc);
  }

  .status {
    display: flex;
    gap: 16px;
    align-items: center;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--arc-dim);
  }

  .online {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #00ff88;
    box-shadow: 0 0 8px #00ff88;
    animation: blink 1.5s infinite;
  }

  @keyframes blink {
    0%,100% { opacity:1; } 50% { opacity:0.3; }
  }

  /* API KEY SECTION - BÜYÜK VE BELİRGİN */
  .api-section {
    background: rgba(0,20,35,0.95);
    border-bottom: 2px solid var(--arc);
    padding: 12px 20px;
    flex-shrink: 0;
  }

  .api-section label {
    display: block;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--arc);
    margin-bottom: 6px;
  }

  .api-section input {
    width: 100%;
    background: rgba(0,30,50,0.9);
    border: 1px solid var(--arc);
    color: var(--arc);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 10px 14px;
    border-radius: 4px;
    outline: none;
    box-shadow: 0 0 10px rgba(0,212,255,0.15);
  }

  .api-section input::placeholder { color: var(--arc-dim); opacity: 0.6; }
  .api-section input:focus { border-color: var(--gold); box-shadow: 0 0 15px rgba(255,165,0,0.2); }

  /* CHAT */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scrollbar-width: thin;
    scrollbar-color: var(--arc-dim) transparent;
  }

  .welcome {
    text-align: center;
    padding: 40px 20px;
    color: var(--arc-dim);
  }

  .welcome h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    letter-spacing: 4px;
    color: var(--arc);
    text-shadow: 0 0 15px var(--arc);
    margin-bottom: 10px;
  }

  .welcome p { font-size: 12px; line-height: 1.8; }

  .ready-badge {
    display: inline-block;
    margin-top: 14px;
    font-size: 10px;
    letter-spacing: 3px;
    color: #00ff88;
    padding: 6px 16px;
    border: 1px solid #00ff8844;
    border-radius: 3px;
    background: rgba(0,255,136,0.05);
    animation: readyPulse 2s ease-in-out infinite;
  }

  @keyframes readyPulse {
    0%,100% { box-shadow: 0 0 5px rgba(0,255,136,0.2); }
    50% { box-shadow: 0 0 15px rgba(0,255,136,0.5); }
  }

  .msg {
    display: flex;
    gap: 10px;
    animation: msgIn 0.3s ease-out;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; flex-shrink: 0; margin-top: 2px;
    font-weight: bold;
  }

  .msg.jarvis .avatar { border: 1px solid var(--arc); color: var(--arc); background: rgba(0,212,255,0.1); }
  .msg.user .avatar { border: 1px solid var(--gold); color: var(--gold); background: rgba(255,165,0,0.1); }

  .bubble {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 4px;
    font-size: 13px;
    line-height: 1.6;
  }

  .msg.jarvis .bubble {
    background: rgba(0,25,45,0.9);
    border: 1px solid var(--border);
    color: #b0e8ff;
  }

  .msg.jarvis .bubble::before {
    content: 'JARVIS //';
    display: block; font-size: 8px;
    letter-spacing: 2px; color: var(--arc); margin-bottom: 5px;
  }

  .msg.user .bubble {
    background: rgba(255,165,0,0.08);
    border: 1px solid rgba(255,165,0,0.3);
    color: #ffd080;
    text-align: right;
  }

  .msg.user .bubble::before {
    content: 'SİZ //';
    display: block; font-size: 8px;
    letter-spacing: 2px; color: var(--gold); margin-bottom: 5px; text-align: right;
  }

  .typing { display: flex; gap: 5px; padding: 4px 0; }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%; background: var(--arc);
    animation: dot 1.2s ease-in-out infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot {
    0%,100% { opacity:0.2; transform:scale(0.8); }
    50% { opacity:1; transform:scale(1.2); }
  }

  /* QUICK COMMANDS */
  .quick-bar {
    display: flex;
    gap: 8px;
    padding: 10px 20px;
    border-top: 1px solid var(--border);
    overflow-x: auto;
    flex-shrink: 0;
    scrollbar-width: none;
  }

  .quick-bar::-webkit-scrollbar { display: none; }

  .qbtn {
    background: rgba(0,25,45,0.9);
    border: 1px solid var(--border);
    color: var(--arc);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    padding: 6px 12px;
    border-radius: 3px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .qbtn:hover { border-color: var(--arc); background: rgba(0,212,255,0.1); }

  /* INPUT */
  .input-area {
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: rgba(2,12,20,0.98);
    flex-shrink: 0;
  }

  .input-area textarea {
    flex: 1;
    background: rgba(0,20,35,0.9);
    border: 1px solid var(--border);
    color: var(--arc);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 10px 14px;
    border-radius: 4px;
    outline: none;
    resize: none;
    min-height: 44px;
    max-height: 100px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }

  .input-area textarea:focus { border-color: var(--arc); }
  .input-area textarea::placeholder { color: var(--arc-dim); opacity: 0.5; }

  .send-btn {
    background: rgba(0,212,255,0.12);
    border: 1px solid var(--arc);
    color: var(--arc);
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 0 18px;
    height: 44px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .send-btn:hover { background: rgba(0,212,255,0.25); box-shadow: 0 0 15px rgba(0,212,255,0.3); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-thumb { background: var(--arc-dim); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="arc-dot"></div>
    <h1>J.A.R.V.I.S</h1>
  </div>
  <div class="status">
    <span id="timer">00:00</span>
    <span>OPENROUTER</span>
    <div class="online"></div>
  </div>
</header>

<!-- API KEY - BÜYÜK VE GÖRÜNÜR -->
<div class="api-section">
  <label>// OPENROUTER API ANAHTARI — BURAYA YAPIŞTIRINIZ</label>
  <input type="password" id="api-key" placeholder="sk-or-v1-... anahtarınızı buraya yapıştırın" />
</div>

<!-- CHAT -->
<div class="chat-area" id="chat">
  <div class="welcome">
    <h2>SİSTEM HAZIR</h2>
    <p>Yukarıdaki alana OpenRouter API anahtarınızı girin,<br>ardından aşağıdan mesaj yazın.</p>
    <div class="ready-badge">// OPENROUTER AKTİF //</div>
  </div>
</div>

<!-- HIZ KOMUTLARI -->
<div class="quick-bar">
  <button class="qbtn" onclick="quick('Bana bugün için motive edici bir günlük brifing ver.')">🌅 Günlük Brifing</button>
  <button class="qbtn" onclick="quick('Üretken bir gün için 5 maddelik görev listesi öner.')">📋 Görev Planı</button>
  <button class="qbtn" onclick="quick('İlginç bir bilimsel gerçek öğret, kısa ve etkileyici.')">🔬 Bilgi Dozu</button>
  <button class="qbtn" onclick="quick('Güçlü ve motive edici bir alıntı söyle.')">⚡ Motivasyon</button>
  <button class="qbtn" onclick="quick('Beni 2 dakikalık nefes meditasyonuna yönlendir.')">🧘 Odaklan</button>
  <button class="qbtn" onclick="quick('Yapay zeka dünyasında son gelişmeleri özetle.')">📡 AI Haberler</button>
</div>

<!-- INPUT -->
<div class="input-area">
  <textarea id="input" placeholder="JARVIS'e sorun... (Enter ile gönderin)" rows="1"></textarea>
  <button class="send-btn" id="send-btn" onclick="send()">GÖNDER ▶</button>
</div>

<script>
const SYSTEM = `Sen JARVIS'sin - Iron Man'deki gibi kişisel AI asistan. Türkçe konuş, profesyonel ama sıcak ol. Cevapları kısa tut (3-4 cümle max) çünkü HomePod'dan sesle okunacak. Zaman zaman ince espri yap.`;

let msgs = [];
let loading = false;
let start = Date.now();

setInterval(() => {
  const e = Math.floor((Date.now()-start)/1000);
  document.getElementById('timer').textContent =
    String(Math.floor(e/60)).padStart(2,'0')+':'+String(e%60).padStart(2,'0');
}, 1000);

const ta = document.getElementById('input');
ta.addEventListener('input', () => {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight,100)+'px';
});
ta.addEventListener('keydown', e => {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

function addMsg(role, text) {
  const chat = document.getElementById('chat');
  const w = chat.querySelector('.welcome');
  if(w) w.remove();

  const d = document.createElement('div');
  d.className = `msg ${role}`;

  const av = document.createElement('div');
  av.className = 'avatar';
  av.textContent = role==='jarvis' ? 'AI' : 'SZ';

  const b = document.createElement('div');
  b.className = 'bubble';
  b.textContent = text;

  d.appendChild(av);
  d.appendChild(b);
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = 'msg jarvis'; d.id = 'typing';
  const av = document.createElement('div');
  av.className = 'avatar'; av.textContent = 'AI';
  const b = document.createElement('div');
  b.className = 'bubble';
  b.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  d.appendChild(av); d.appendChild(b);
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if(t) t.remove();
}

function speak(text) {
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'tr-TR'; u.rate = 0.92; u.pitch = 0.9;
  const voices = window.speechSynthesis.getVoices();
  const tr = voices.find(v => v.lang.startsWith('tr'));
  if(tr) u.voice = tr;
  window.speechSynthesis.speak(u);
}

async function quick(text) {
  document.getElementById('input').value = text;
  await send();
}

async function send() {
  const key = document.getElementById('api-key').value.trim();
  const text = ta.value.trim();
  if(!text || loading) return;

  if(!key) {
    addMsg('jarvis', 'Efendim, lütfen önce yukarıdaki alana OpenRouter API anahtarınızı girin!');
    return;
  }

  loading = true;
  document.getElementById('send-btn').disabled = true;
  ta.value = ''; ta.style.height = 'auto';

  addMsg('user', text);
  msgs.push({role:'user', content:text});
  showTyping();

  try {
    const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${key}`,
        'HTTP-Referer': 'https://onurdagg76-crypto.github.io',
        'X-Title': 'JARVIS'
      },
      body: JSON.stringify({
        model: 'google/gemini-2.0-flash-lite:free',
        messages: [{role:'system',content:SYSTEM}, ...msgs],
        max_tokens: 400,
        temperature: 0.8
      })
    });

    const data = await res.json();

    if(data.error) {
      removeTyping();
      addMsg('jarvis', `Hata: ${data.error.message}`);
    } else {
      const reply = data.choices[0].message.content;
      removeTyping();
      addMsg('jarvis', reply);
      msgs.push({role:'assistant', content:reply});
      speak(reply);
    }
  } catch(err) {
    removeTyping();
    addMsg('jarvis', 'Bağlantı hatası. İnternet bağlantınızı kontrol edin.');
  } finally {
    loading = false;
    document.getElementById('send-btn').disabled = false;
  }
}

window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
</script>
</body>
</html>
